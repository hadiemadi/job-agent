services:
  - type: web
    name: jobseeker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_SCRAPER
        value: "false"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: DAILY_AI_BUDGET_USD
        value: "3"
      - key: AI_RATE_LIMIT_MAX
        value: "20"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW_MIN
        value: "15"
      - key: DAILY_JOB_SEARCH_CAP
        value: "50"
      - key: ANTHROPIC_PRICE_INPUT_PER_MTOK
        sync: false
      - key: ANTHROPIC_PRICE_OUTPUT_PER_MTOK
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: JOOBLE_KEY
        sync: false
